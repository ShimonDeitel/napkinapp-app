name: Napkinapp
options:
  bundleIdPrefix: com.shimondeitel.napkinnotes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Napkinapp:
    type: application
    platform: iOS
    sources:
      - path: Napkinapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napkinnotes
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Napkinapp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NapkinappTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NapkinappTests
      - path: Napkinapp.storekit
    dependencies:
      - target: Napkinapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napkinnotes.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NapkinappUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NapkinappUITests
    dependencies:
      - target: Napkinapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napkinnotes.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Napkinapp:
    build:
      targets:
        Napkinapp: all
        NapkinappTests: [test]
        NapkinappUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Napkinapp.storekit
    test:
      config: Debug
      storeKitConfiguration: Napkinapp.storekit
      targets:
        - NapkinappTests
        - NapkinappUITests
    archive:
      config: Release
